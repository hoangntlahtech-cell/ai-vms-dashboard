<!DOCTYPE html>
<html>
<head>
<title>AI VMS ENTERPRISE</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin:0;
    font-family:Segoe UI;
    background:#020617;
    color:#e2e8f0;
}

header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px;
}

.logo {
    display:flex;
    align-items:center;
    gap:10px;
}

.logo img { height:40px; }

/* KPI */
.grid {
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
    padding:20px;
}

.card {
    background:#0f172a;
    padding:20px;
    border-radius:12px;
    text-align:center;
}

.card h2 { color:#0ea5e9; }

/* MAIN */
.main {
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:20px;
    padding:20px;
}

.feed {
    background:#0f172a;
    padding:10px;
    height:400px;
    overflow:auto;
}

.event {
    padding:10px;
    border-bottom:1px solid #1e293b;
    display:flex;
    justify-content:space-between;
}

.camera {
    background:#1e293b;
    padding:3px 6px;
    border-radius:6px;
}

/* CAMERA GRID */
.camera-grid {
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    padding:20px;
}

.cam-box { position:relative; }

.cam-box span {
    position:absolute;
    top:8px;
    left:8px;
    background:rgba(0,0,0,0.6);
    padding:4px 8px;
    font-size:12px;
    border-radius:6px;
}

.camera-grid video {
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:10px;
    background:#000;
}
</style>
</head>

<body>

<header>
<div class="logo">
<img src="/snapshot/logo.png">
<b style="color:#0ea5e9;">AI VMS ENTERPRISE</b>
</div>
<div style="color:#22c55e;">● LIVE</div>
</header>

<!-- KPI -->
<div class="grid">
<div class="card">Transactions<h2 id="total">0</h2></div>
<div class="card">Persons<h2 id="persons">0</h2></div>
<div class="card">Cameras<h2 id="cams">8</h2></div>
<div class="card">Alerts<h2 id="alerts">0</h2></div>
</div>

<!-- MAIN -->
<div class="main">
<canvas id="chart"></canvas>
<div class="feed" id="feed"></div>
</div>

<!-- CAMERA -->
<div class="camera-grid">
<div class="cam-box"><span>CAM 01</span><video src="/snapshot/cam1.mp4" autoplay muted loop></video></div>
<div class="cam-box"><span>CAM 02</span><video src="/snapshot/cam2.mp4" autoplay muted loop></video></div>
<div class="cam-box"><span>CAM 03</span><video src="/snapshot/cam3.mp4" autoplay muted loop></video></div>
<div class="cam-box"><span>CAM 04</span><video src="/snapshot/cam4.mp4" autoplay muted loop></video></div>
<div class="cam-box"><span>CAM 05</span><video src="/snapshot/cam5.mp4" autoplay muted loop></video></div>
<div class="cam-box"><span>CAM 06</span><video src="/snapshot/cam6.mp4" autoplay muted loop></video></div>
<div class="cam-box"><span>CAM 07</span><video src="/snapshot/cam7.mp4" autoplay muted loop></video></div>
<div class="cam-box"><span>CAM 08</span><video src="/snapshot/cam8.mp4" autoplay muted loop></video></div>
</div>

<script>

// KPI GLOBAL
let TOTAL_TRANSACTIONS = 0;
let TOTAL_PERSONS = 0;
let TOTAL_ALERTS = 0;
let LAST_EVENT_ID = 0;


// CHART
let chart = new Chart(document.getElementById("chart"), {
    type:'line',
    data:{
        labels:[],
        datasets:[
            {
                label:"Transactions",
                data:[],
                borderColor:"#0ea5e9",
                backgroundColor:"rgba(14,165,233,0.2)",
                tension:0.4,
                fill:true
            },
            {
                label:"Persons",
                data:[],
                borderColor:"#ef4444",
                backgroundColor:"rgba(239,68,68,0.2)",
                tension:0.4,
                fill:true
            }
        ]
    },
    options:{
        responsive:true,
        animation:{ duration:800 },
        scales:{ y:{ beginAtZero:true } }
    }
});


// INIT
async function init(){
    await fetch("/reset");
    await new Promise(r => setTimeout(r,1000));
    loadData();
    setInterval(loadData,1500);
}


// LOAD DATA
async function loadData(){

    let res = await fetch("/events");
    let data = await res.json();

    // ===== KPI =====
    let newEvents = data.filter(e => e.id > LAST_EVENT_ID);

    newEvents.forEach(e => {
        TOTAL_TRANSACTIONS += 1;
        TOTAL_PERSONS += e.persons;

        if(e.persons >= 2){
            TOTAL_ALERTS += 1;
        }

        LAST_EVENT_ID = e.id;
    });

    document.getElementById("total").innerText = TOTAL_TRANSACTIONS;
    document.getElementById("persons").innerText = TOTAL_PERSONS;
    document.getElementById("alerts").innerText = TOTAL_ALERTS;


    // ===== FIX CHART (KHÔNG DÙNG TIME FILTER) =====
    let last45 = data.slice(-50);

    // sort theo thời gian
    last45.sort((a,b)=> new Date(a.time) - new Date(b.time));

    let map = {};

    last45.forEach(e=>{
        let t = new Date(e.time).toLocaleTimeString();

        if(!map[t]){
            map[t] = {trans:0, persons:0};
        }

        if(e.persons >= 2){
            map[t].trans += 1;
        }

        map[t].persons += e.persons;
    });

    let labels = Object.keys(map);
    let trans = labels.map(t => map[t].trans);
    let persons = labels.map(t => map[t].persons);

    // fallback nếu rỗng
    if(labels.length === 0){
        labels = ["No Data"];
        trans = [0];
        persons = [0];
    }

    chart.data.labels = labels;
    chart.data.datasets[0].data = trans;
    chart.data.datasets[1].data = persons;
    chart.update();


    // ===== FEED =====
    let html="";
    last45.slice().reverse().forEach(e=>{
        html += `
        <div class="event">
            <div>${new Date(e.time).toLocaleTimeString()}</div>
            <div class="camera">${e.camera}</div>
        </div>`;
    });

    document.getElementById("feed").innerHTML = html;
}

init();

</script>

</body>
</html>
